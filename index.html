<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Voicing Trainer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0f0f1a;
    color: #ccccdd;
    min-height: 100vh;
    padding: 50px 30px;
  }

  .container { max-width: 900px; margin: 0 auto; }

  .header {
    text-align: center;
    margin-bottom: 50px;
  }
  .header h1 {
    font-size: 36px; font-weight: 700; color: #e8e8f0;
    letter-spacing: -1px; margin-bottom: 8px;
  }
  .header .subtitle {
    font-size: 14px; color: #8888aa;
    font-weight: 300; letter-spacing: 3px; text-transform: uppercase;
  }

  .stats {
    display: flex; gap: 24px; justify-content: center;
    margin-bottom: 40px; flex-wrap: wrap;
  }
  .stat {
    background: #1a1a2e; border: 1px solid #2a2a4a;
    border-radius: 12px; padding: 16px 24px; text-align: center;
    min-width: 120px;
  }
  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px; font-weight: 700; color: #6c63ff;
  }
  .stat-label {
    font-size: 10px; color: #8888aa; letter-spacing: 2px;
    text-transform: uppercase; margin-top: 4px;
  }

  .filters {
    display: flex; gap: 12px; margin-bottom: 30px; flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    font-size: 10px; color: #8888aa; letter-spacing: 2px;
    text-transform: uppercase; font-weight: 600;
  }
  .filter-btn {
    padding: 5px 14px; border-radius: 16px;
    border: 1px solid #2a2a4a; background: transparent;
    color: #666680; font-size: 11px; cursor: pointer;
    font-family: 'Inter', sans-serif; letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: #6c63ff; color: #6c63ff; }
  .filter-btn.active {
    background: #6c63ff; color: #0f0f1a;
    border-color: #6c63ff; font-weight: 600;
  }

  .search-box {
    flex: 1; min-width: 200px; padding: 8px 16px;
    background: #1a1a2e; border: 1px solid #2a2a4a;
    border-radius: 8px; color: #ccccdd;
    font-family: 'Inter', sans-serif; font-size: 13px;
  }
  .search-box::placeholder { color: #666680; }
  .search-box:focus { outline: none; border-color: #6c63ff; }

  .day-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .day-card {
    background: #1a1a2e; border: 1px solid #2a2a4a;
    border-radius: 14px; padding: 20px;
    cursor: pointer; transition: all 0.2s;
    text-decoration: none; color: inherit; display: block;
  }
  .day-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.3), 0 0 15px rgba(108, 99, 255, 0.2);
    border-color: #6c63ff;
  }
  .day-card .day-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: #6c63ff; letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .day-card .day-title {
    font-size: 17px; font-weight: 600; color: #e8e8f0;
    margin-bottom: 4px;
  }
  .day-card .day-key {
    font-size: 13px; color: #8888aa; margin-bottom: 10px;
  }
  .day-card .day-chords {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .day-card .chord-pill {
    padding: 2px 10px; border-radius: 10px;
    background: #0f0f1a; border: 1px solid #2a2a4a;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: #ccccdd;
  }
  .day-card .day-meta {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 12px;
  }
  .day-card .stage-tag {
    font-size: 10px; color: #6c63ff; letter-spacing: 1px;
    text-transform: uppercase;
  }
  .day-card .rating-display {
    font-size: 12px; color: #6c63ff;
  }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: #666680;
  }
  .empty-state h2 { font-size: 18px; margin-bottom: 8px; color: #8888aa; }

  .footer {
    text-align: center; margin-top: 60px; padding-top: 30px;
    border-top: 1px solid #2a2a4a;
    font-size: 11px; color: #666680; letter-spacing: 1px;
  }

  .export-btn {
    margin-top: 20px; padding: 8px 20px; border-radius: 8px;
    border: 1px solid #2a2a4a; background: transparent;
    color: #8888aa; cursor: pointer; font-family: 'Inter', sans-serif;
    font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
    transition: all 0.2s;
  }
  .export-btn:hover { border-color: #6c63ff; color: #6c63ff; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Voicing Trainer</h1>
    <div class="subtitle">Daily chord voicing practice</div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="filters">
    <span class="filter-label">Filter</span>
    <div id="level-filters"></div>
    <div id="prog-filters"></div>
    <input class="search-box" id="search" type="text" placeholder="Search by key, chord, or stage...">
  </div>

  <div class="day-grid" id="day-grid"></div>

  <div class="empty-state" id="empty" style="display:none">
    <h2>No days match your filter</h2>
    <p>Try adjusting your search or filters</p>
  </div>

  <div class="footer">
    VOICING TRAINER
    <br>
    <button class="export-btn" onclick="exportRatings()">Export All Ratings</button>
  </div>
</div>

<script>
let manifest = { days: [] };
let activeFilters = { level: null, prog: null, search: '' };

async function loadManifest() {
  try {
    const res = await fetch('manifest.json');
    manifest = await res.json();
  } catch (e) {
    manifest = { days: [] };
  }
  render();
}

function getRating(dateStr) {
  const raw = localStorage.getItem('voicing-ratings-' + dateStr);
  return raw ? JSON.parse(raw) : null;
}

function render() {
  const days = manifest.days || [];

  // Stats
  const totalDays = days.length;
  const uniqueKeys = new Set(days.map(d => d.key)).size;
  const rated = days.filter(d => getRating(d.date)).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-value">${totalDays}</div><div class="stat-label">Days</div></div>
    <div class="stat"><div class="stat-value">${uniqueKeys}</div><div class="stat-label">Keys Covered</div></div>
    <div class="stat"><div class="stat-value">${rated}</div><div class="stat-label">Rated</div></div>
  `;

  // Level filters
  const levels = [...new Set(days.flatMap(d => d.levels))];
  document.getElementById('level-filters').innerHTML = levels.map(l =>
    `<button class="filter-btn ${activeFilters.level === l ? 'active' : ''}"
      onclick="toggleFilter('level','${l}')">${l}</button>`
  ).join('');

  // Progression filters
  const progs = [...new Set(days.map(d => d.progression))];
  document.getElementById('prog-filters').innerHTML = progs.map(p =>
    `<button class="filter-btn ${activeFilters.prog === p ? 'active' : ''}"
      onclick="toggleFilter('prog','${p}')">${p}</button>`
  ).join('');

  // Filter days
  let filtered = days;
  if (activeFilters.level) {
    filtered = filtered.filter(d => d.levels.includes(activeFilters.level));
  }
  if (activeFilters.prog) {
    filtered = filtered.filter(d => d.progression === activeFilters.prog);
  }
  if (activeFilters.search) {
    const q = activeFilters.search.toLowerCase();
    filtered = filtered.filter(d =>
      d.key.toLowerCase().includes(q) ||
      d.stage.toLowerCase().includes(q) ||
      d.chords.some(c => c.toLowerCase().includes(q)) ||
      d.progression.toLowerCase().includes(q)
    );
  }

  // Sort newest first
  filtered.sort((a, b) => b.date.localeCompare(a.date));

  // Render grid
  const grid = document.getElementById('day-grid');
  const empty = document.getElementById('empty');

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map(d => {
    const rating = getRating(d.date);
    const stars = rating ? '★'.repeat(rating.stars) : '';
    return `
      <a class="day-card" href="${d.file}">
        <div class="day-num">Day ${d.day_number} · Week ${d.week_number}</div>
        <div class="day-title">${d.progression} in ${d.key}</div>
        <div class="day-key">${d.stage}</div>
        <div class="day-chords">
          ${d.chords.map(c => `<span class="chord-pill">${c}</span>`).join('')}
        </div>
        <div class="day-meta">
          <span class="stage-tag">${d.levels.join(' · ')}</span>
          <span class="rating-display">${stars}</span>
        </div>
      </a>
    `;
  }).join('');
}

function toggleFilter(type, value) {
  if (activeFilters[type] === value) {
    activeFilters[type] = null;
  } else {
    activeFilters[type] = value;
  }
  render();
}

document.getElementById('search').addEventListener('input', (e) => {
  activeFilters.search = e.target.value;
  render();
});

function exportRatings() {
  const allRatings = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('voicing-ratings-')) {
      const dateStr = key.replace('voicing-ratings-', '');
      allRatings[dateStr] = JSON.parse(localStorage.getItem(key));
    }
  }
  const blob = new Blob([JSON.stringify(allRatings, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'voicing-ratings.json';
  a.click();
  URL.revokeObjectURL(url);
}

loadManifest();
</script>
</body></html>
